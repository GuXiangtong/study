# Nginx configuration for tong-study
# 部署路径: /etc/nginx/sites-available/tong-study
# 然后: ln -s /etc/nginx/sites-available/tong-study /etc/nginx/sites-enabled/

upstream tong_study {
    server 127.0.0.1:5001;
    keepalive 4;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名，如: study.example.com

    # 上传文件大小限制（试卷PDF/图片上传）
    client_max_body_size 32M;

    # 请求体缓冲区
    client_body_buffer_size 10M;

    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态文件（CSS/JS/字体等）
    location /static/ {
        alias /opt/tong-study/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location /favicon.ico {
        alias /opt/tong-study/static/favicon.ico;
        expires 30d;
        access_log off;
    }

    # 反向代理到Gunicorn
    location / {
        proxy_pass http://tong_study;

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置（OCR和LLM处理较慢，需要较长超时）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;

        # HTTP 1.1 (keepalive)
        proxy_http_version 1.1;
    }

    # 禁止访问隐藏文件（.claude/apikey等）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问Python文件
    location ~ \.py$ {
        deny all;
    }

    # 禁止访问数据库文件
    location ~ \.db$ {
        deny all;
    }

    # 健康检查端点（可选）
    location /health {
        proxy_pass http://tong_study;
        access_log off;
    }
}

