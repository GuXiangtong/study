{% extends "base.html" %}
{% block title %}修改密码 - 高考错题复习助手{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>{% if is_forced %}修改初始密码{% else %}修改密码{% endif %}</h1>
        {% if is_forced %}
        <p class="auth-subtitle" style="color:var(--warning,#b45309);">首次登录请修改初始密码后再继续使用</p>
        {% else %}
        <p class="auth-subtitle">修改您的登录密码</p>
        {% endif %}
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" name="old_password" placeholder="输入当前密码" required autofocus>
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" placeholder="至少 6 个字符" required>
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" name="confirm_password" placeholder="再次输入新密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">确认修改</button>
        </form>
        {% if not is_forced %}
        <p class="auth-footer"><a href="{{ url_for('index') }}">返回首页</a></p>
        {% endif %}
    </div>
</div>
{% endblock %}
