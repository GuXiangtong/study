{% extends "base.html" %}
{% block title %}注册 - 高考错题复习助手{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>创建账号</h1>
        <p class="auth-subtitle">注册后即可开始管理你的错题和学习进度</p>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="输入用户名（至少 2 个字符）" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="输入密码（至少 6 个字符）" required>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="confirm_password" placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <p class="auth-footer">
            已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
        </p>
    </div>
</div>
{% endblock %}
