{% extends "base.html" %}
{% block title %}录入新题目{% endblock %}

{% block content %}
<div class="page-header">
    <h1>录入新题目</h1>
    <p>上传题目图片或手工输入题目内容。</p>
</div>

<form method="POST" enctype="multipart/form-data" class="question-form">
    <div class="card">
        <h2>基本信息</h2>
        <div class="form-group">
            <label>学科 <span class="required">*</span></label>
            <select name="subject_id" id="subject-select" required>
                <option value="">请选择学科</option>
                {% for s in subjects %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>选择已有考试</label>
                <select name="exam_id">
                    <option value="">或创建新考试</option>
                    {% for e in exams %}
                    <option value="{{ e.id }}">{{ e.subject_name }} - {{ e.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>或新建考试名称 <span class="required">*</span></label>
                <input type="text" name="exam_name" placeholder="如：高二下期中">
            </div>
            <div class="form-group">
                <label>考试日期</label>
                <input type="date" name="exam_date">
            </div>
        </div>

        <div class="form-group">
            <label>题号 <span class="required">*</span></label>
            <input type="text" name="question_number" placeholder="如：18" required>
        </div>

        <div class="form-group">
            <label>题目内容（文字输入）</label>
            <textarea name="stem" rows="4" placeholder="输入题目文字内容，支持 LaTeX 公式如 $x^2 + y^2 = 1$"></textarea>
            <p class="form-hint">如果题目以图片形式存在，可以只上传图片。</p>
        </div>

        <div class="form-group">
            <label>上传题目图片</label>
            <input type="file" name="image" accept="image/*" onchange="previewImage(this)">
            <img id="image-preview" class="image-preview" style="display:none" alt="预览">
        </div>
    </div>

    <div class="card">
        <h2>子问题（可选的，如大题下的小题）</h2>
        <p class="form-hint">如果此题有多个小问，请逐行填写。单问题目只需填一行。</p>
        <div id="sub-questions-container">
            <div class="sub-question-card">
                <div class="form-row">
                    <div class="form-group" style="flex:0 0 80px">
                        <label>标号</label>
                        <input type="text" name="sq_label" placeholder="(1)" value="(1)">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>子问题内容</label>
                        <input type="text" name="sq_content" placeholder="子问题文字描述（可选）">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>正确答案</label>
                        <textarea name="sq_correct_answer" rows="2" placeholder="正确答案或解题步骤"></textarea>
                    </div>
                    <div class="form-group">
                        <label>学生错误答案</label>
                        <textarea name="sq_student_answer" rows="2" placeholder="学生当时的错误作答"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出错原因（学生自述）</label>
                        <textarea name="sq_error_reason" rows="2" placeholder="为何做错？"></textarea>
                    </div>
                    <div class="form-group" style="flex:0 0 180px">
                        <label>错误类型</label>
                        <select name="sq_error_type">
                            <option value="">请选择</option>
                            <option value="概念不清">概念不清</option>
                            <option value="计算失误">计算失误</option>
                            <option value="思路缺失">思路缺失</option>
                            <option value="粗心">粗心</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-secondary" onclick="addSubQuestion()">+ 添加子问题</button>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存题目</button>
        <a href="{{ url_for('questions.list_questions') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
function addSubQuestion() {
    var container = document.getElementById('sub-questions-container');
    var idx = container.children.length;
    var html = '<div class="sub-question-card">'
        + '<div class="form-row">'
        + '<div class="form-group" style="flex:0 0 80px"><label>标号</label>'
        + '<input type="text" name="sq_label" placeholder="(' + (idx+1) + ')" value="(' + (idx+1) + ')"></div>'
        + '<div class="form-group" style="flex:1"><label>子问题内容</label>'
        + '<input type="text" name="sq_content" placeholder="子问题文字描述（可选）"></div>'
        + '</div>'
        + '<div class="form-row">'
        + '<div class="form-group"><label>正确答案</label>'
        + '<textarea name="sq_correct_answer" rows="2" placeholder="正确答案或解题步骤"></textarea></div>'
        + '<div class="form-group"><label>学生错误答案</label>'
        + '<textarea name="sq_student_answer" rows="2" placeholder="学生当时的错误作答"></textarea></div>'
        + '</div>'
        + '<div class="form-row">'
        + '<div class="form-group"><label>出错原因（学生自述）</label>'
        + '<textarea name="sq_error_reason" rows="2" placeholder="为何做错？"></textarea></div>'
        + '<div class="form-group" style="flex:0 0 180px"><label>错误类型</label>'
        + '<select name="sq_error_type"><option value="">请选择</option>'
        + '<option value="概念不清">概念不清</option>'
        + '<option value="计算失误">计算失误</option>'
        + '<option value="思路缺失">思路缺失</option>'
        + '<option value="粗心">粗心</option></select></div>'
        + '</div></div>';
    container.insertAdjacentHTML('beforeend', html);
}

function previewImage(input) {
    var preview = document.getElementById('image-preview');
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
