{% extends "base.html" %}
{% block title %}编辑题目{% endblock %}

{% block content %}
<div class="page-header">
    <h1>编辑题目</h1>
</div>

<form method="POST" enctype="multipart/form-data" class="question-form">
    <div class="card">
        <h2>基本信息</h2>
        <div class="form-group">
            <label>题号</label>
            <input type="text" name="question_number" value="{{ question.question_number }}" required>
        </div>
        <div class="form-group">
            <label>题目内容</label>
            <textarea name="stem" rows="4">{{ question.stem or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>学生错误答案（选填）</label>
                <textarea name="student_answer" rows="2">{{ question.student_answer or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>出错原因（选填）</label>
                <textarea name="error_reason" rows="2">{{ question.error_reason or '' }}</textarea>
            </div>
        </div>
        <div class="form-group">
            <label>替换图片</label>
            <input type="file" name="image" accept="image/*" onchange="previewImage(this)">
            <img id="image-preview" class="image-preview" style="display:none" alt="预览">
            {% if question.image_path %}
            <p>当前图片：<a href="{{ url_for('serve_image', subject=question.subject_name, exam=question.exam_name, filename=question.image_path.split('/')[-1]) }}" target="_blank">查看</a></p>
            {% endif %}
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存修改</button>
        <a href="{{ url_for('questions.detail', question_id=question.id) }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
